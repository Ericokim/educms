## Optional: local PostgreSQL for development if you don't have one installed.
## Matches the defaults in apps/api/.env.example.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: educms
      POSTGRES_PASSWORD: educms
      POSTGRES_DB: educms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educms -d educms"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
