# Render Blueprint: EduCMS API + PostgreSQL
# Dashboard -> New -> Blueprint -> select this repo.
# Free-tier notes: the web service sleeps after inactivity (first request is
# slow), uploads are ephemeral (no persistent disk on free), and the free
# Postgres instance expires after 30 days.

databases:
  - name: educms-db
    plan: free
    databaseName: educms
    user: educms

services:
  - type: web
    name: educms-api
    runtime: node
    plan: free
    # Root install builds @educms/shared (postinstall); migrations run at
    # build time so every deploy ships with an up-to-date schema.
    buildCommand: npm ci && npm run build -w apps/api && npm run migrate -w apps/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.19.4"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: educms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://educms.vercel.app # updated after the Vercel deploy
      - key: UPLOAD_DIR
        value: /tmp/educms-uploads
      - key: MAX_FILE_SIZE
        value: "5242880"
